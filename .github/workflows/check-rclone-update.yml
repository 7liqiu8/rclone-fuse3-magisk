name: Check Rclone Update

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check latest upstream release
        id: check
        shell: bash
        run: |
          CURRENT_VERSION=$(grep -oP '^version=\K.*' magisk-rclone/module.prop)
          LATEST_VERSION=$(curl -fsSL https://api.github.com/repos/rclone/rclone/releases/latest | jq -r '.tag_name')

          echo "Current version: $CURRENT_VERSION"
          echo "Latest version:  $LATEST_VERSION"

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT_VERSION" != "$LATEST_VERSION" ]]; then
            echo "update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Workflow summary
        shell: bash
        run: |
          {
            echo "## Rclone version check"
            echo ""
            echo "- Current: `${{ steps.check.outputs.current_version }}`"
            echo "- Latest:  `${{ steps.check.outputs.latest_version }}`"
            echo "- Update available: `${{ steps.check.outputs.update_available }}`"
          } >> "$GITHUB_STEP_SUMMARY"
