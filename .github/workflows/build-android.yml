name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'rclone 版本号（留空则从 module.prop 读取）'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Patch
        run: ./patch.sh

      - name: Install meson and ninja
        run: pip install meson ninja

      - name: Set up Go
        uses: actions/setup-go@v5

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_NAME="${{ github.event.inputs.version }}"
          else
            TAG_NAME=$(grep -oP '^version=\K.*' magisk-rclone/module.prop)
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "Using version: $TAG_NAME"

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build arm64-v8a
        run: ./build.sh arm64-v8a $TAG_NAME

      - name: Build x86_64
        run: ./build.sh x86_64 $TAG_NAME

      - name: Upload Android binaries
        uses: actions/upload-artifact@v4
        with:
          name: magisk-rclone
          if-no-files-found: error
          path: "*.zip"
