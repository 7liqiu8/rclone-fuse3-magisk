name: Build Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip unzip wget curl patch pkg-config python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install meson ninja

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          cache: false

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Apply libfuse patches
        run: bash ./patch.sh

      - name: Set release metadata
        shell: bash
        run: |
          VERSION=$(grep -oP '^version=\\K.*' magisk-rclone/module.prop)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          else
            RELEASE_TAG="manual-build"
          fi
          echo "MODULE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "GITHUB_REPOSITORY_URL=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"


      - name: Build ${{ matrix.abi }}
        shell: bash
        run: bash ./build.sh "${{ matrix.abi }}" "$RELEASE_TAG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magisk-rclone-${{ matrix.abi }}
          if-no-files-found: error
          path: |
            magisk-rclone_${{ matrix.abi }}.zip
            update-${{ matrix.abi }}.json

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-build' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-build' }}
          files: |
            dist/**/*.zip
            dist/**/*.json
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
